name: Aktualizace JIRA dashboardu

on:
  schedule:
    # Každé pondělí v 6:00 UTC (= 7:00 nebo 8:00 CZ podle letního času)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Umožní ruční spuštění tlačítkem na GitHubu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: pip install requests

      - name: Generování dashboardu
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          OUTPUT_DIR: docs
        run: python generate_dashboard.py

      - name: Commit a push nového dashboardu
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard aktualizován $(date +'%Y-%m-%d')"
          git push
